<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - AI Resume Analyzer</title>

<link rel="stylesheet" href="style.css">

<!-- FONT -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ICONS -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* =========================
   BODY
========================= */

body{

  font-family:'Poppins',sans-serif;

  color:#fff;

  overflow-x:hidden;

  background:
  linear-gradient(
    -45deg,
    #020617,
    #0f172a,
    #111827,
    #1e293b
  );

  background-size:400% 400%;

  animation:bgMove 12s ease infinite;
}

@keyframes bgMove{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* =========================
   DOTS
========================= */

body::before{

  content:"";

  position:fixed;
  inset:0;

  background-image:
  radial-gradient(
    rgba(255,255,255,0.10) 1px,
    transparent 1px
  );

  background-size:40px 40px;

  opacity:0.16;

  z-index:-5;
}

/* =========================
   MOBILE MENU
========================= */

.menu-toggle{

  display:none;

  font-size:28px;

  cursor:pointer;
}

/* =========================
   CONTACT SECTION
========================= */

.contact{

  min-height:100vh;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  padding:120px 20px 70px;

  text-align:center;
}

/* =========================
   HEADING
========================= */

.contact h1{

  font-size:42px;

  margin-bottom:12px;

  background:
  linear-gradient(
    270deg,
    #38bdf8,
    #818cf8,
    #22c55e,
    #f472b6,
    #38bdf8
  );

  background-size:600% 600%;

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  animation:movingGradient 6s ease infinite;
}

@keyframes movingGradient{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

.contact p{

  max-width:600px;

  margin-bottom:35px;

  opacity:0.8;

  line-height:1.8;

  animation:fadeUp 1.3s ease;
}

/* =========================
   FORM
========================= */

.contact-form{

  width:100%;

  max-width:520px;

  display:flex;

  flex-direction:column;

  gap:18px;

  animation:fadeUp 1.6s ease;
}

/* INPUTS */

.contact-form input,
.contact-form textarea{

  padding:14px;

  border-radius:12px;

  border:none;

  outline:none;

  background:
  rgba(255,255,255,0.05);

  color:#fff;

  font-size:15px;

  transition:0.3s;

  border:
  1px solid rgba(255,255,255,0.05);
}

.contact-form input:focus,
.contact-form textarea:focus{

  border:
  1px solid rgba(56,189,248,0.4);

  box-shadow:
  0 0 15px rgba(56,189,248,0.18);
}

/* PLACEHOLDER */

.contact-form input::placeholder,
.contact-form textarea::placeholder{

  color:#9ca3af;
}

/* TEXTAREA */

.contact-form textarea{

  resize:none;

  min-height:140px;
}

/* =========================
   BUTTON
========================= */

.contact-form button{

  position:relative;

  width:100%;

  padding:15px 22px;

  border:none;

  cursor:pointer;

  overflow:hidden;

  font-size:15px;
  font-weight:600;

  letter-spacing:0.5px;

  color:white;

  border-radius:16px;

  background:#0f172a;

  transition:0.35s ease;

  z-index:1;
}

/* RGB BORDER */

.contact-form button::before{

  content:"";

  position:absolute;

  inset:-3px;

  border-radius:18px;

  background:
  linear-gradient(
    270deg,
    #00f0ff,
    #3b82f6,
    #8b5cf6,
    #ff00c8,
    #00f0ff
  );

  background-size:500% 500%;

  animation:borderMove 5s linear infinite;

  z-index:-3;

  box-shadow:
  0 0 12px #00f0ff,
  0 0 22px #3b82f6,
  0 0 32px #8b5cf6,
  0 0 42px #ff00c8;
}

/* INNER */

.contact-form button::after{

  content:"";

  position:absolute;

  inset:2px;

  border-radius:14px;

  background:#0f172a;

  z-index:-1;
}

/* HOVER */

.contact-form button:hover{

  transform:
  translateY(-4px)
  scale(1.02);

  box-shadow:
  0 0 18px rgba(0,240,255,0.45),
  0 0 32px rgba(59,130,246,0.35),
  0 0 48px rgba(139,92,246,0.28),
  0 0 65px rgba(255,0,200,0.20);
}

/* CLICK */

.contact-form button:active{

  transform:scale(0.98);
}

/* RGB ANIMATION */

@keyframes borderMove{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* =========================
   SOCIALS
========================= */

.socials{

  margin-top:35px;

  display:flex;

  gap:22px;

  flex-wrap:wrap;

  justify-content:center;
}

.socials a{

  font-size:24px;

  color:#fff;

  transition:0.3s;
}

/* INSTAGRAM */

.socials a:nth-child(1):hover i{

  transform:scale(1.2);

  background:
  linear-gradient(
    270deg,
    #f9ce34,
    #ee2a7b,
    #6228d7,
    #f9ce34
  );

  background-size:600% 600%;

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  animation:instaMove 3s ease infinite;

  filter:
  drop-shadow(0 0 10px rgba(238,42,123,0.6));
}

@keyframes instaMove{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* GITHUB */

.socials a:nth-child(2):hover i{

  transform:scale(1.2);

  background:
  linear-gradient(
    270deg,
    #06b6d4,
    #3b82f6,
    #8b5cf6,
    #06b6d4
  );

  background-size:600% 600%;

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  animation:githubFlow 3s ease infinite;

  filter:
  drop-shadow(0 0 12px rgba(59,130,246,0.7));
}

@keyframes githubFlow{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* LINKEDIN */

.socials a:nth-child(3):hover i{

  transform:scale(1.2);

  background:
  linear-gradient(
    270deg,
    #0ea5e9,
    #2563eb,
    #38bdf8,
    #0ea5e9
  );

  background-size:600% 600%;

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  animation:linkedinFlow 3s ease infinite;

  filter:
  drop-shadow(0 0 12px rgba(37,99,235,0.7));
}

@keyframes linkedinFlow{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* GMAIL */

.socials a:nth-child(4):hover i{

  transform:scale(1.2);

  background:
  linear-gradient(
    270deg,
    #ea4335,
    #fbbc05,
    #34a853,
    #4285f4,
    #ea4335
  );

  background-size:700% 700%;

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  animation:gmailFlow 3s ease infinite;

  filter:
  drop-shadow(0 0 12px rgba(234,67,53,0.7));
}

@keyframes gmailFlow{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* =========================
   FADE UP
========================= */

@keyframes fadeUp{

  from{

    opacity:0;

    transform:translateY(30px);
  }

  to{

    opacity:1;

    transform:translateY(0);
  }
}

/* =========================
   RESPONSIVE
========================= */

/* MOBILE MENU */

@media(max-width:900px){

  .menu-toggle{

    display:block;
  }

  .nav-links{

    position:absolute;

    top:80px;
    right:20px;

    background:#081120;

    flex-direction:column;

    width:220px;

    padding:20px;

    border-radius:16px;

    display:none;

    z-index:999;
  }

  .nav-links.show{

    display:flex;
  }
}

/* TABLET */

@media(max-width:768px){

  .contact{

    padding:110px 18px 60px;
  }

  .contact h1{

    font-size:32px;
  }

  .contact p{

    font-size:14px;
  }

  .contact-form{

    max-width:100%;
  }

  .socials{

    gap:18px;
  }

  .socials a{

    font-size:22px;
  }
}

/* SMALL MOBILE */

@media(max-width:480px){

  .contact h1{

    font-size:28px;
  }

  .contact p{

    font-size:13px;
  }

  .contact-form input,
  .contact-form textarea{

    font-size:14px;
  }

  .contact-form button{

    font-size:14px;
  }

  .socials a{

    font-size:20px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar"> 

  <div class="logo">
    AI Resume 
  </div>

  <ul class="nav-links" id="navLinks">

    <li>
      <a href="home.html">
        <i class="fa-solid fa-house"></i> Home
      </a>
    </li>

    <li>
      <a href="about.html">
        <i class="fa-solid fa-circle-info"></i> About
      </a>
    </li>

    <li>
      <a href="jobmatcher.html">
        <i class="fa-solid fa-briefcase"></i> Job Matcher
      </a>
    </li>

    <li>
      <a href="upload.html">
        <i class="fa-solid fa-upload"></i> Score
      </a>
    </li>

    <li>
      <a href="contact.html" class="active">
        <i class="fa-solid fa-envelope"></i> Contact
      </a>
    </li>

  </ul>

  <!-- MENU -->

  <div class="menu-toggle" onclick="toggleMenu()">
    ☰
  </div>

</nav>

<!-- CONTACT -->

<section class="contact">

  <h1>
    Contact Us
  </h1>

  <p>
    Have questions or want to improve your resume?
    Reach out and we’ll help you get started.
  </p>

  <!-- FORM -->

  <form class="contact-form">

    <input
      type="text"
      placeholder="Your Name"
      required
    >

    <input
      type="email"
      placeholder="Your Email"
      required
    >

    <textarea
      placeholder="Your Message"
    ></textarea>

    <button type="submit">
      Send Message
    </button>

  </form>

  <!-- SOCIALS -->

  <div class="socials">

    <a href="#">
      <i class="fa-brands fa-instagram"></i>
    </a>

    <a href="#">
      <i class="fa-brands fa-github"></i>
    </a>

    <a href="#">
      <i class="fa-brands fa-linkedin"></i>
    </a>

    <a href="#">
      <i class="fa-solid fa-envelope"></i>
    </a>

  </div>

</section>

<!-- MOBILE MENU JS -->

<script>

function toggleMenu(){

  document
  .getElementById("navLinks")
  .classList
  .toggle("show");
}

</script>

</body>
</html>
